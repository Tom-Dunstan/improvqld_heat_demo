<html>
<body>
    <div class="sqs-block-content"><div class="sqs-code-container" data-localized="{&quot;enableSafeModeTitle&quot;:&quot;Embedded Scripts&quot;,&quot;exitSafeModeButton&quot;:&quot;Exit safe preview&quot;,&quot;enableSafeModeText&quot;:&quot;This block contains embedded scripts. Embedded scripts are disabled while you're logged in and editing your site.&quot;,&quot;enableSafeModeButton&quot;:&quot;Preview in safe mode&quot;,&quot;exitSafeModeTitle&quot;:&quot;Safe Preview&quot;,&quot;exitSafeModeText&quot;:&quot;Please view the page after logging out for accurate rendering.&quot;,&quot;globalSafeMode&quot;:&quot;Embedded Code: This block contains embedded code that has been disabled.&quot;,&quot;scriptDisabled&quot;:&quot;Script Disabled&quot;}">
  
    
<div class="timetable-container">
  <h2>Find Your Theatresports Heat</h2>

  <input type="text" id="schoolSearch" placeholder="Type your school name...">

  <table id="schoolTable" style="margin: 5; display: none; anchor-name: --schoolTable;">
    <thead></thead>
    <tbody></tbody>
  </table>

  <div popover="hint" id="heatInfo" style="position: absolute; position-anchor: --schoolTable; top: anchor(top); left: anchor(right); bottom: auto; margin: 5; margin-right: auto;">
    <table id="heatInfoTable" style="display: none;">
      <thead></thead>
      <tbody></tbody>
    </table>
    <div id="heatInfoNotFound" style="display: block;">
      <h1>No heats found for team</h1>
      <p>
        There are currently no heats scheaduled for this team
      </p>
    </div>
  </div>

  </table>
</div>

<style>
.timetable-container {
  max-width: 100%;
}

#schoolSearch {
  padding: 10px;
  width: 100%;
  max-width: 400px;
  font-size: 16px;
  margin: 15px 0 25px 0;
}

#schoolTable {
  border-collapse: collapse;
  /*width: 100%;*/
  display: none; /* HIDDEN UNTIL SEARCH */
}

#schoolTable th,
#schoolTable td {
  padding: 10px;
  text-align: left;
}

#schoolTable th,
#schoolTable td.line {
  border-bottom: 1px solid #ddd;
}

#schoolTable tr:hover {
  background-color: #89cddf;
}

#schoolTable th {
  background-color: #fafafa;
}

#heatInfo {
  min-width: 20em;
}

#heatInfo .label {
  width: 2em;
  padding-right: 1em;
}

#heatInfo table {
  width: 100%;
}

#heatInfo table table {
  border-top: 1px solid #ddd;
}


</style>

<script crossorigin="anonymous" src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>

/*
 * Data files (JSON)
 */
const heatsDataUrl = "./Heats.json"

/**
 * Search Prdicates
 */
class FindBy {
  static Id = (o, id) => o.id == id;
  static SchoolId = (o, id) => o.schoolId == id;
  static SchoolName = (school, value) => school && school.schoolName.toLowerCase().includes(value);
}

/**
 * Sort Prdicates
 */
class SortBy {
  static Name = (a,b) => a.name.localeCompare(b.name);
  static Division = (a,b) => -a.division.localeCompare(b.division);
  static Date = (a,b) => new Date(a) - new Date(b);
}

/**
 * Global elements
 */
class ElementNames {
  static School = {
    Search: "schoolSearch",
    Table: "schoolTable" 
  };
  static Heats = {
    Popover: "heatInfo",
    Row: "heatrow",
    Table: "heatInfoTable",
    NotFound: "heatInfoNotFound"
  }
};

class Elements {
  static School = {
    Search:document.getElementById(ElementNames.School.Search), 
    Table: document.getElementById(ElementNames.School.Table),
    TableHeader: document.querySelector(`#${ElementNames.School.Table} thead`),
    TableBody: document.querySelector(`#${ElementNames.School.Table} tbody`)
  };
  static Heats = {
    Popover: document.getElementById(ElementNames.Heats.Popover),
    Table: document.getElementById(ElementNames.Heats.Table),
    TableHeader: document.querySelector(`#${ElementNames.Heats.Table} thead`),
    TableBody: document.querySelector(`#${ElementNames.Heats.Table} tbody`),
    NotFound: document.getElementById(ElementNames.Heats.NotFound)
  };
}

Object.defineProperty(Elements.Heats, "TableRows", {
  get () {
    return document.querySelectorAll(`.${ElementNames.Heats.Row}`);
  },
  enumerable: true,
  configurable: false
}); 

/* Formating */
class DateFormat {
  static Locality =  'en-AU';
  static Options = {
    weekday: 'long',
    day: 'numeric',
    month: 'long',
    year: 'numeric',
    timeZone: "Australia/Brisbane"
  }
};
const dateFormater = new Intl.DateTimeFormat(DateFormat.Locality,DateFormat.Options);

function setGlobalEvents(){
    Elements.School.Table.addEventListener("mouseout", e => {
    Elements.Heats.Popover.hidePopover();
  });
}

function clearHeatInfoTable() {
  Elements.Heats.TableHeader.innerHTML = "";
  Elements.Heats.TableBody.innerHTML = "";
};

function noHeatFound() {
  clearHeatInfoTable();

  Elements.Heats.Table.style.display = "none";
  Elements.Heats.NotFound.style.display = "block";
}

function showHeatInfo() {
  Elements.Heats.NotFound.style.display = "none";
  Elements.Heats.Table.style.display = "table";
}

function displayHeatsFromElement(event){
  if(!event){
    noHeatFound();
    return;
  }

  const element = event.target.closest(`.${ElementNames.Heats.Row}`);

  if(!element?.dataset?.team) {
    noHeatFound();
    return;
  }

  const teamtData = atob(element.dataset.team);
  const team = JSON.parse(teamtData);

  if(!team?.heats?.length){
    noHeatFound();
    return;
  }
  
  

  const heat = team.heats[0];
  const heatDate = new Date(heat.date);

  Elements.Heats.TableHeader.innerHTML = `<tr><th colspan="2">Heat (${heat.id})</th></tr>`;
  var heatInfoHtml = `
  <tr><td class="label">Venue</td><td>${heat.venue.name}</td></tr>
  <tr><td class="label">Date</td><td>${dateFormater.format(heatDate)}</td></tr>
  <tr><td class="label">Division</td><td>${heat.division}</td></tr>
  <tr><td class="label">MC</td><td>${heat.mc}</td></tr>
  <tr><td class="label">Venue Address</td><td>${heat.venue.address ?? "TBA"}</td></tr>
  `;
  heatInfoHtml += `
  <tr>
    <td colspan=2>
      <table>
        <thead><tr><th colspan=2>Teams</th></tr></thead>
        <tbody>`;
  heat.teams.forEach(heatTeam =>{
    const rowStyle = heatTeam.teamId == team.id ? ' style="font-weight: bold;"' : "";
    heatInfoHtml +=`
         <tr${rowStyle}><td>${heatTeam.school}</td><td>${heatTeam.team}</td></tr>
    `;
  });
  heatInfoHtml += `
        </tbody>
      </table>
    </td>
  </tr>`;  

  Elements.Heats.TableBody.innerHTML = heatInfoHtml;
  showHeatInfo();
}

function displaySchools(data) {
  
  Elements.School.TableHeader.innerHTML = "";
  Elements.School.TableBody.innerHTML = "";

  if (data.length === 0) {
    Elements.School.TableBody.innerHTML = "<tr><td colspan='5'>No results found.</td></tr>";
  } else {
    Elements.School.TableHeader.innerHTML = `
      <tr>
        <th>School</th>
        <th>Teams</th>
        <th>Division</th>
      </tr>
    `;

    var schoolRowHtml = "";
      
    data.forEach(school => {
      if(!school) return;

      if(!(school.teams?.length ?? 0)) {
        schoolRowHtml += `
        <tr>
          <td class="line">${school.schoolName}</td>
          <td class="line" colspan=2>- No Teams -</td>
        </tr>
        `;
      }else{
        school.teams.forEach((team, i, a) => {
          const id = `${school.schoolId}-${team.id}`;
          const anchorStyle = ``;

          const isLast = i == a.length - 1;
          const cellClass = isLast ? ` class="line"` : "";
          schoolRowHtml += `
            <tr style="anchor-name: --anchor-${id} " class="${ElementNames.Heats.Row}" data-id="${id}" data-team='${btoa(JSON.stringify(team))}'>
              <td ${cellClass}>${i == 0 ? school.schoolName : ""}</td>
              <td class="line">${team.name}</td>
              <td class="line">${team.division}</td>
            </tr>
            `;
        });
      }

      Elements.School.TableBody.innerHTML = schoolRowHtml;

      const heatRows = Elements.Heats.TableRows;

      heatRows.forEach(row => {
        row.addEventListener("mouseover", e => {
          displayHeatsFromElement(e);
          Elements.Heats.Popover.showPopover({source: row});
        });

        row.addEventListener("focus", e => {
          displayHeatsFromElement(e);
          Elements.Heats.Popover.showPopover({source: row});
        });

        row.addEventListener("blur", e => {
          Elements.Heats.PopovererElement.hidePopover();
        });
      });
    });
  }

  // SHOW TABLE ONLY AFTER SEARCH
  Elements.School.Table.style.display = "table";
}

const mapResponseTextToJSON = response => response.json();

const mapToHeatsModel = heatsJson => {
  const heatsData = heatsJson.Heats.sort(SortBy.Date)
                                   .map(h => {
                                     const venue = heatsJson.Venues.find(v => FindBy.Id(v, h.venueId));
                                     const mc = heatsJson.Venues.find(v => FindBy.Id(v, h.mcId));
                                     const heatDate = new Date(h.date);
                                     const heatTeams = h.teams.map(id => {
                                     const heatTeam = heatsJson.Teams.find(t => FindBy.Id(t, id));
                                     const teamSchool = heatsJson.Schools.find(s => FindBy.Id(s, heatTeam.schoolId));

                                     return {
                                         schoolId: heatTeam.schoolId,
                                         school: teamSchool.name,
                                         teamId: heatTeam.id,
                                         team: heatTeam.name,
                                         division: heatTeam.division
                                       };
                                     });

                                     return {
                                       id: h.id,
                                       division: h.division,
                                       venue: {name: venue.name, address: venue.address},
                                       mc: mc.name,
                                       date: heatDate,
                                       teams: heatTeams
                                     };
                                   });
    const schools = heatsJson.Schools.map((school) => {
      const schoolTeams = heatsJson.Teams
                                   .filter(t => FindBy.SchoolId(t, school.id))
                                   .sort(SortBy.Name)
                                   .sort(SortBy.Division)
                                   .map(t => {
                                    const teamId = t.id;
                                    const heats = heatsData.filter(h => h.teams.some(ht => ht.teamId == t.id));

                                    return {
                                      id: t.id,
                                      name: t.name,
                                      division: t.division,
                                      heats: heats
                                    }
                                   });

      return {
        schoolId: school.id,
        schoolName: school.name,
        teams: schoolTeams
      }
    });

    return schools;
};

const hookUpEvents = schools => {
  Elements.School.Search.addEventListener("keyup", e => onSearchKeyUp(e?.target, schools));
};

/*
 * Event Hadnlers
 */
function onSearchKeyUp(element, schools) {

  const value = element.value.trim().toLowerCase();

  // If search box is empty → hide table again
  if (value === "") {
    Elements.School
            .Table
            .style
            .display = "none";
    return;
  }

  const filtered = schools.filter(school => FindBy.SchoolName(school, value));

  displaySchools(filtered);
}

function onError(error){
  console.error("Error loading heats data: ", error);
}

/*
 * Run
 */

setGlobalEvents();

fetch(heatsDataUrl)
  .then(mapResponseTextToJSON)
  .then(mapToHeatsModel)
  .then(hookUpEvents)
  .catch(onError)

</script>
  
</div>
</div>
</body>

</html>
