<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet"
        href="https://use.fontawesome.com/releases/v5.14.0/css/all.css"
        integrity="sha384-HzLeBuhoNPvSl5KYnjx0BT+WB0QEEqLprO+NBkkk5gbc67FTaL7XIGa2w1L0Xbgc"
        crossorigin="anonymous">
  <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
  <style id="style-vars">
:root {
  --test-size: 1rem;

  --media-mobile-width: 768px;

  --text-colour-default: hsl(210deg 14% 53%);
  --button-text-colour: hsl(210deg 14%  53% / 70%);
  --button-text-hover-colour: hsl(210deg 14% 70% / 90%);

  --body-gradient: linear-gradient(to top,
    hsl(217deg 19% 27%), 
    hsl(221deg 39% 11%), 
    hsl(0deg 0% 0%));

  --group-background-colour: hsl(217deg 19% 20% / 50%);

  --sub-group-background-colour: hsl(0deg 0% 0% / 50%);


  --button-background-colour: hsl(217deg 19% 20% / 70%);
  /* --button-background-hover-colour: hsl(217deg 19% 20% / 70%); */

  --backdrop-gradient: linear-gradient(to top,
    hsl(217deg 19% 20%), 
    hsl(221deg 39% 19%), 
    hsl(0deg 0% 0%)); 

  --warning-gradient: linear-gradient(to top,
    hsl(55deg, 97, 88), 
    hsl(50deg 98% 64%), 
    hsl(45deg 93% 78%));

  --border-radius-defualt: 0.5rem;

  --title-text-colour: hsl(0deg 0% 100% / 80%);

}

  <style id="page-elements-style">
::backdrop {
  background-image: var(--backdrop-gradient);
  opacity: 0.75;
}

html {
  font-size: 100%;
}

body {
  min-block-size: 100vb;
  font-family: sans-serif;
  /* font-size: 1rem; */

  color: var(--text-colour-default);

  background-image: var(--body-gradient);
}

@media screen and (max-width: 768px) {
  html {
    font-size: 130%;
  }
}

  </style>
  <style id="table-elements-style">
div.table-row:has(.collapsible):after {
  content: '\002B';
  color: white;
  font-weight: bold;
  float: right;
  margin-left: -1rem;
}

div.table-row:has(.collapsible):has(.active):after {
  content: "\2212";
}

.collapsible {
  cursor: pointer;
}

.collapsible-content {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.2s ease-out;
}

div.active .collapsible-content {
  max-height: none;
}

div.table-row:has(.collapsible):has(.active),
div.table-row:has(.collapsible:hover){
  background-color: var(--button-background-colour);
}

.tabel-cell.commands {
  vertical-align: top;
}

.table-row-group {
  display: table-row-group;
  row-gap: 0.5rem;
}

.table-row {
  display: flex;
  padding-inline: 0.5rem;
  margin-block-end: 0.5rem;
  border-radius: var(--border-radius-defualt);
}

.tabel-header-cell,
.tabel-cell {
  display: table-cell;
  padding-block: 0.2rem;
  padding-inline: 0.2rem;
  padding-inline-start: 0.3rem;
}

.tabel-cell {
  vertical-align: middle;
}

.tabel-cell.commands {
  width: 1px;
  min-width: 1.5rem;
  padding-inline: 0;
}

.tabel-cell input {
  width: 100%;
  height: 100%;
}

.tabel-cell[data-field]{
  padding-inline: 0.5rem;
  flex-grow: 1;
}

.table-header-group {
  display: table-header-group;
  font-weight: bold;
}

.editor.sub-editor .table-row {
  /* padding-inline-start: 0; */
  margin-block: 0.25rem;
}

.editor.sub-editor .table-header-group .table-row {
  margin-block-end: 0;
}

.teams-editor {
  border-radius: var(--border-radius-defualt);
  background-color: var(--sub-group-background-colour);
}

.teams-editor:not(:last-child) {
  margin-block-end: 1rem;
}

.teams-editor:last-child {
  margin-block-end: 0.5rem;
}


  </style>
  <style id="title-element-style">
title {
  display: block;
  font-size: 2rem;
  font-weight: bold;
  color: var(--title-text-colour);
  margin-block-start: 0.2rem;
  margin-block-end: 0.5rem;
  margin-inline-start: 0;
  margin-inline-end: 0;

title.level-1 {

title.level-2 {

}

title.level-4 {
  font-size: 1rem;
}

title.level-5 {
  font-size: 0.83rem;
}

.table-header-group title {
  margin-block: 0;
}


  </style>
  <style id="warning-dialog-style">
#warning-dialog {
  background-image: var(--warning-gradient);
  border-radius: var(--border-radius-defualt);
  font-size: 1rem;
  padding: auto;
}

#warning-dialog-message-container {
  display: flex;
  flex-direction: row;
  gap: 1rem;
  justify-content: center;
  align-items: center;
}

#warning-dialog-icon,
#warning-dialog-message {
  display: inline-block;
}

#warning-dialog-icon {
  font-size: 3rem;
  color: hsl(50deg 98% 45%);
}

#warning-dialog-responses {
  margin-block-start: 2rem;
  display: flex;
  flex-direction: row;
  justify-content: center;
  gap: 1rem;
}

#warning-dialog-responses button {
  padding-block: 0.5rem;
  padding-inline: 0.5rem;
  font-weight: bold;
  color: hsl(55deg, 97, 88);
  background-color: hsl(50deg 98% 64%);
  border-radius: var(--border-radius-defualt);
  border: none;
  transition: color 0.2s ease-in-out;
  transition: background-color 0.1s ease-in-out;
}

#warning-dialog-responses button:hover,
#warning-dialog-responses button:focus {
  outline: none; 
  color: hsl(55deg, 97, 68);
  background-color: hsl(50deg 98% 50%);
}

  </style>

  <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/toastify-js" crossorigin="anonymous"></script>
  <script id="editor-scripts">

    class Elements {
      static Names = {
        Collapsible: {
          Head: "collapsible",
          Content: "collapsible-content"
        },
        Dialog: {
          Warning: "warning-dialog",
          Message: "warning-dialog-message",
          Confirm: "warning-dialog-confirm",
          Cancel: "warning-dialog-cancel"
        },
        Upload: {
          JSON: {
            Button: "load-json",
            File: "json-upload"
          },
          CSV: {
            Button: "load-csv",
            File: "csv-upload"
          }
        },
        Save: {
          Button: "save"
        },
        Download: {
          Button: "download"
        },
        Menu: {
          Links: ".menu-link"
        },
        Section: "section", 
        School: {
          Count: "school-count",
          All: "schools",
          Editor: "schools-editor",
          NewButton: "new-school",
          EditButton: "edit-school",
          DeleteButton: "delete-school",
          SaveButton: "save-school",
          CancelButton: "cancel-edit-school",
          NewSeniorTeamButton: "new-senior-team",
          NewJuniorTeamButton: "new-junior-team"
        },
        Team: {
          All: "teams",
          Count: "team-count",
          Editor: "teams-editor",
          EditButton: "edit-team",
          DeleteButton: "delete-team",
          SaveButton: "save-team",
          CancelButton: "cancel-edit-team"
        },
        Venue: {
          All: "venues",
          Count: "venue-count"
        },
        MC: {
          All: "mcs",
          Count: "mc-count"
        },
        Heat: {
          All: "heats",
          Count: "heat-count"
        }
      };

      static #childTableBody = (elementName) => document.querySelectorAll(`#${elementName} table tbody`)[0];
      static #childEditorBody(elementName) { return document.querySelectorAll(`#${elementName} .table-row-group`)[0]};
      static #childrenEditorClass(elementName, className) { return document.querySelectorAll(`#${elementName} .${className}`)};

      static Collapsible = {
        Head: document.querySelectorAll(`.${this.Names.Collapsible.Head}`)
      };
      static Dialog = {
        Warning: document.getElementById(this.Names.Dialog.Warning),
        Message: document.getElementById(this.Names.Dialog.Message),
        Confirm: document.getElementById("warning-dialog-confirm"),
        Cancel: document.getElementById("warning-dialog-cancel")
      };
      static Upload = {
        JSON: {
          Button: document.getElementById(this.Names.Upload.JSON.Button),
          File: document.getElementById(this.Names.Upload.JSON.File)
        } ,
        CSV: {
          Button: document.getElementById(this.Names.Upload.CSV.Button),
          File: document.getElementById(this.Names.Upload.CSV.File)
        },
      };
      static Save = {
        Button: document.getElementById(this.Names.Save.Button)
      };
      static Download = {
        Button: document.getElementById(this.Names.Download.Button)
      }
      static Menu = {
        Links: document.querySelectorAll(this.Names.Menu.Links)
      };
      static Section = {
        All: document.querySelectorAll(this.Names.Section)
      }
      static School = {
        Count: document.getElementById(this.Names.School.Count),
        TableBody: this.#childTableBody(this.Names.School.All),
        Editor: {
          NewButton: document.getElementById(this.Names.School.NewButton),
          Section: document.getElementById(this.Names.School.Editor),
          TableBody: this.#childEditorBody(this.Names.School.Editor),
          EditButton: (row) => row.querySelector(`.${this.Names.School.EditButton}`),
          DeleteButton: (row) => row.querySelector(`.${this.Names.School.DeleteButton}`),
          SaveButton: (row) => row.querySelector(`.${this.Names.School.SaveButton}`),
          CancelButton: (row) => row.querySelector(`.${this.Names.School.CancelButton}`),
          NewSeniorTeamButton: (row) => row.querySelector(`.${this.Names.School.NewSeniorTeamButton}`),
          NewJuniorTeamButton: (row) => row.querySelector(`.${this.Names.School.NewJuniorTeamButton}`),
          Rows: () => this.School.Editor.TableBody.querySelectorAll(".table-row"),
          ItemById: (id) => this.School.Editor.TableBody.querySelector(`[data-schoolid="${id}"]`)
        }
      };
      static Team = {
        Count: document.getElementById(this.Names.Team.Count),
        TableBody: this.#childTableBody(this.Names.Team.All),
        Editor: { 
          TableBody: (row, division) => row.querySelector(`.${this.Names.Team.Editor} [data-division="${division}"]`),
          EditButton: (row) => row.querySelector(`.${this.Names.Team.EditButton}`),
          DeleteButton: (row) => row.querySelector(`.${this.Names.Team.DeleteButton}`),
          SaveButton: (row) => row.querySelector(`.${this.Names.Team.SaveButton}`),
          CancelButton: (row) => row.querySelector(`.${this.Names.Team.CancelButton}`),
        }
      };
      static Venue = {
        Count: document.getElementById(this.Names.Venue.Count),
        TableBody: this.#childTableBody(this.Names.Venue.All)
      };
      static MC = {
        Count: document.getElementById(this.Names.MC.Count),
        TableBody: this.#childTableBody(this.Names.MC.All)
      };
      static Heat = {
        Count: document.getElementById(this.Names.Heat.Count),
        TableBody: this.#childTableBody(this.Names.Heat.All)
      };
    }

    class PopupMessage {
      static #messageColour = "linear-gradient(to top, hsl(230, 92, 82), rgb(192, 132, 252))";
      static #errorColour= "linear-gradient(to top, hsl(0, 93%, 52%), hsl(0, 80%, 40%))";
      static #options = {
        duration: 3000, // Display duration in milliseconds (3 seconds)
        gravity: "top", // Position: 'top' or 'bottom'
        position: "right", // Position: 'left' or 'right'
        stopOnFocus: true,
        close: true
      };
      static Show = (text) => {
        Toastify({ 
          ...this.#options, 
          text: text,
          style: { background: this.#messageColour }
        }).showToast();
      }

      static ShowError = (text) => {
        Toastify({ 
          ...this.#options, 
          text: text,
          style: { background: this.#errorColour }
        }).showToast();
      };

      static FeatureNotImplemented = (featureName) => this.ShowError(`The ${ !featureName ? "" : `${featureName}`} feature is not implemented yet`);

      static WarningDialog = class {
        static confirmButtonHandler = undefined;
        static cancelButtonHandler = undefined;
        static Show = (message, confirmHandler, cancelHandler) => {
          if(!message) message = "Warning!";
          Elements.Dialog.Message.innerHTML = message;

          if(this.confirmButtonHandler) {
            Elements.Dialog.Confirm.removeEventListener("click", this.confirmButtonHandler)
          }

          if(this.cancelButtonHandler) {
            Elements.Dialog.Cancel.removeEventListener("click", this.cancelButtonHandler)
          }

          this.confirmButtonHandler = () => {
            if(confirmHandler)
              confirmHandler();
              Elements.Dialog.Warning.close();
          };

          this.cancelButtonHandler = () => {
            if(cancelHandler)
              cancelHandler();
              Elements.Dialog.Warning.close();
          };

          Elements.Dialog.Confirm.addEventListener("click", this.confirmButtonHandler)

          Elements.Dialog.Cancel.addEventListener("click", this.cancelButtonHandler)

          Elements.Dialog.Warning.showModal();
        };
      }

    }

    class Data {
      static Dirty = false;

      static #heats = null;

      static #findBy =  {
        Id: (o, id) => o.id == id
      }

      static #sortBy = {
        Name: (a,b) => a.name.localeCompare(b.name),
        SchoolName: (a, b) => this.Schools.Find(a.schoolId).name.localeCompare(this.Schools.Find(b.schoolId).name),
        Division: (a,b) => -a.division.localeCompare(b.division),
        Date:  (a,b) => new Date(a.date) - new Date(b.date)
      }

      static Schools = {
        All: () => this.#heats.Schools,
        Find: (id) => this.#heats.Schools.find(school => this.#findBy.Id(school, id)),
        Sorted: () => this.#heats.Schools.sort(this.#sortBy.Name),
        Delete: (id) => {
          const schoolIndex = this.#heats.Schools.findIndex(school => this.#findBy.Id(school, id));
          if(schoolIndex < 0)
            return false;

          this.Teams.DeleteBySchoolId(id);

          this.#heats.Schools.splice(schoolIndex, 1);
          return true;
        },
        DivsionTeams: (id, division) =>
          this.#heats.Teams.filter(team => (team.schoolId === id)
                                        && (team.division === division)),
        NameExits: (id, name) => this.#heats.Schools.filter(school => school.id !== id && school.name.toLowerCase() === name.toLowerCase()).length > 0
      }

      static Teams = {
        All: () => this.#heats.Teams,
        Find: (id) => this.#heats.Teams.find(team => this.#findBy.Id(team, id)),
        Sorted: () => this.#heats.Teams
                                 .sort(this.#sortBy.Name)
                                 .sort(this.#sortBy.Division)
                                 .sort(this.#sortBy.SchoolName),
        Delete: () => {},
        DeleteBySchoolId: (id) => {
          if(typeof id !== "number")
            return false;
          const teams = this.#heats.Teams.filter(team => team.schoolId == id);

          if(!teams.length)
            return false;

          teams.forEach(team => this.Heats.DeleteTeamById(team.id));

          teams.map(team => this.#heats.Teams.findIndex(t => t.id === team.id))
               .filter(index => index > -1)
               .reverse()
               .forEach(index => this.#heats.Teams.splice(index, 1));
          return true;
        }
      }

      static Venues = {
        All: () => this.#heats.Venues,
        Find: (id) => this.#heats.Venues.find(venue => this.#findBy.Id(venue, id)) ?? this.Venues.Null,
        Sorted: () => this.#heats.Venues.sort(this.#sortBy.Name),

        All: () => this.#heats.Heats,
        Find: (id) => this.#heats.Heats.find(heat => this.#findBy.Id(heat, id)),
        Sorted: () => this.#heats.Heats.sort(this.#sortBy.Date),
        DeleteTeamById: (teamId) => {
          this.#heats.Heats.filter(heat => heat.teams.includes(teamId))
                           .forEach(heat => heat.teams.map(team => 
                                                        heat.teams.findIndex(id => id === teamId))
                                                      .filter(index => index > -1)
                                                      .reverse()
                                                      .forEach(index => 
                                                        heat.teams.splice(index, 1)));

          return true;
        }
      }

        Load: () => {
          const dataString = window.localStorage.getItem(this.#localStorageKey);
          this.verify(JSON.parse(dataString));
          Render.All();
        },

        Save: () => {
          this.verify();

          try {
            localStorage.setItem(this.#localStorageKey, JSON.stringify(this.#heats))
            this.Dirty = false;
            PopupMessage.Show("Data saved to local storage");
          } catch (error){
            PopupMessage.ShowError(error);
          }
        }
      }

      static verify(newData) {
        if(newData) this.#heats = newData;
        if(!this.#heats){
          this.#heats = this.#reset();
          return;
        }
        if(!this.#heats.Schools) this.#heats.Schools = this.#Empty.getSchools();
        if(!this.#heats.Teams) this.#heats.Teams = this.#Empty.getTeams();
        if(!this.#heats.Venues) this.#heats.Venues = this.#Empty.getVenues();
        if(!this.#heats.MCs) this.#heats.MCs = this.#Empty.getMCs();
        if(!this.#heats.Heats) this.#heats.Heats = this.#Empty.getHeats();

        return this.#heats;
      }

      static #reset() {
        this.verify({});
      }

        this.#localStorage.Load();
      }

        asJSON: () => {
          try{
            const fileType = "application/json"

            const blob = new Blob([JSON.stringify(this.verify())], { type: fileType });
            const url = URL.createObjectURL(blob);

            const a = document.createElement("a");
            a.href = url;
            a.download = this.#defaultFilename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
              
          } catch (error) {
            PopupMessage.ShowError(error);
          }
        }
      };

                  } catch (error){

                reader.onerror = (e) => {

        const schools = Data.Schools.Sorted()
        Elements.School.Count.innerHTML = `${schools.length ?? 0}`;
        Elements.School.TableBody.innerHTML = schools.reduce(this.#render.School.All, "");

        schools.forEach(school => {
          const row = this.#createElement.School.DisplayRow(school);
          Elements.School.Editor.TableBody.append(row);
        });

      }

      static Teams(){
        if(!Data.Teams.All().length) {
          Render.#resetSection(Elements.Team)
          return;
        }

        const teams = Data.Teams.Sorted();
        Elements.Team.Count.innerHTML = `${teams.length ?? 0}`;
        Elements.Team.TableBody.innerHTML = teams.reduce(this.#render.Team.All, "");
      }

      static Venues() {
        const venues = Data.Venues.Sorted();
        Elements.Venue.Count.innerHTML = `${venues.length ?? 0}`;
        Elements.Venue.TableBody.innerHTML = venues.reduce(this.#render.Venue.All, "");
      }

      static MCs() {
        const mc = Data.MCs.Sorted();
        Elements.MC.Count.innerHTML = `${mc.length ?? 0}`;
        Elements.MC.TableBody.innerHTML = mc.reduce(this.#render.MC.All, "");
      }

      static Heats() {
        const heat = Data.Heats.Sorted();
        Elements.Heat.Count.innerHTML = `${heat.length ?? 0}`;
        Elements.Heat.TableBody.innerHTML = heat.reduce(this.#render.Heat.All, "");
      }

      static All() {
        if(!Data.verify()) {
          this.#reset();
          return;
        }

        this.Schools();
        
        this.Teams();

        this.Venues();

        this.MCs();

        this.Heats();
      }

    }

    Data.EnableEvents();
    Render.EnableEvents();
    Data.LoadData();

  </script>
</body>
</html>
