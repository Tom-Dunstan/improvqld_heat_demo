  <script id="editor-scripts">

    class Elements {
      static #names = {
        Dialog: {
          Warning: "warning-dialog",

          Confirm: "warning-dialog-confirm",
          Cancel: "warning-dialog-cancel"

        },

        School: {

          All: "schools",
          Editor: "schools-editor",
        },
        Team: {
          All: "teams",
          Count: "team-count"
        },
        Venue: {
          All: "venues",
          Count: "venue-count"
        },
        MC: {
          All: "mcs",
          Count: "mc-count"
        },
        Heat: {
          All: "heats",
          Count: "heat-count"
        }
      };

      static #childTableBody = (elementName) => document.querySelectorAll(`#${elementName} table tbody`)[0];
      static #childEditorBody(elementName) { return document.querySelectorAll(`#${elementName} .table-row-group`)[0]};

      static Dialog = {
        Warning: document.getElementById(this.#names.Dialog.Warning),
        Message: document.getElementById(this.#names.Dialog.Message),
        Confirm: document.getElementById("warning-dialog-confirm"),
        Cancel: document.getElementById("warning-dialog-cancel")

      };
      static Upload = {

        Csv: document.getElementById(this.#names.Upload.Csv),
      };
      static Menu = {
        Links: document.querySelectorAll(this.#names.Menu.Links)
      };
      static Section = {
        All: document.querySelectorAll(this.#names.Section)
      }
      static School = {
        Count: document.getElementById(this.#names.School.Count),
        TableBody: this.#childTableBody(this.#names.School.All),
        Editor: {
          Section: document.getElementById(this.#names.School.Editor),
          TableBody: this.#childEditorBody(this.#names.School.Editor),
          Rows: () => this.School.Editor.TableBody.querySelectorAll(".table-row"),
          ItemById: (id) => this.School.Editor.TableBody.querySelector(`[data-schoolid="${id}"]`)
        }
      };
      static Team = {
        Count: document.getElementById(this.#names.Team.Count),
        TableBody: this.#childTableBody(this.#names.Team.All)
      };
      static Venue = {
        Count: document.getElementById(this.#names.Venue.Count),

      };

      };
    }

    class PopupMessage {
      static #messageColour = "linear-gradient(to top, hsl(230, 92, 82), rgb(192, 132, 252))";
      static #errorColour= "linear-gradient(to top, hsl(0, 93%, 52%), hsl(0, 80%, 40%))";
      static #options = {
        duration: 3000, // Display duration in milliseconds (3 seconds)
        gravity: "top", // Position: 'top' or 'bottom'
        position: "right", // Position: 'left' or 'right'
        stopOnFocus: true,
        close: true
      };
      static Show = (text) => {
        Toastify({ 
          ...this.#options, 
          text: text,
          style: { background: this.#messageColour }
        }).showToast();
      }

      static ShowError = (text) => {
        Toastify({ 
          ...this.#options, 
          text: text,
          style: { background: this.#errorColour }
        }).showToast();
      };

      static FeatureNotImplemented = (featureName) => this.ShowError(`The ${ !featureName ? "" : `${featureName}`} feature is not implemented yet`);

      static WarningDialog = class {
        static confirmButtonHandler = undefined;
        static cancelButtonHandler = undefined;
        static Show = (message, confirmHandler, cancelHandler) => {
          if(!message) message = "Warning!";
          Elements.Dialog.Message.innerHTML = message;

          if(this.confirmButtonHandler) {
            Elements.Dialog.Confirm.removeEventListener("click", this.confirmButtonHandler)
          }

          if(this.cancelButtonHandler) {
            Elements.Dialog.Cancel.removeEventListener("click", this.cancelButtonHandler)
          }

          this.confirmButtonHandler = () => {
            if(confirmHandler)
              confirmHandler();
              Elements.Dialog.Warning.close();
          };

          this.cancelButtonHandler = () => {
            if(cancelHandler)
              cancelHandler();
              Elements.Dialog.Warning.close();
          };

          Elements.Dialog.Confirm.addEventListener("click", this.confirmButtonHandler)

          Elements.Dialog.Cancel.addEventListener("click", this.cancelButtonHandler)

          Elements.Dialog.Warning.showModal();
        };
      }

    }

    class Data {
      static #heats = null;

      static #findBy = class  {
        static Id = (o, id) => o.id == id;
      }

      static #sortBy = class {
        static Name = (a,b) => a.name.localeCompare(b.name);
        static Division = (a,b) => -a.division.localeCompare(b.division);
        static Date = (a,b) => new Date(a.date) - new Date(b.date);
      }

      static Schools = {
        All: () => this.#heats.Schools,
        Find: (id) => this.#heats.Schools.find(school => this.#findBy.Id(school, id)),
        Sorted: () => this.#heats.Schools.sort(this.#sortBy.Name),
        Delete: (id) => {
          const schoolIndex = this.#heats.Schools.findIndex(school => this.#findBy.Id(school, id));
          if(schoolIndex < 0)
            return false;

          this.Teams.DeleteBySchoolId(id);

          this.#heats.Schools.splice(schoolIndex, 1);
          return true;
        }
      }

      static Teams = {
        All: () => this.#heats.Teams,
        Find: (id) => this.#heats.Teams.find(team => this.#findBy.Id(team, id)),
        Sorted: () => this.#heats.Teams
                                 .sort(this.#sortBy.Name)
                                 .sort(this.#sortBy.Division),
        Delete: () => {},
        DeleteBySchoolId: (id) => {
          if(typeof id !== "number")
            return false;
          const teams = this.#heats.Teams.filter(team => team.schoolId == id);

          if(!teams.length)
            return false;

          teams.forEach(team => this.Heats.DeleteTeamById(team.id));

          teams.map(team => this.#heats.Teams.findIndex(t => t.id === team.id))
               .filter(index => index > -1)
               .reverse()
               .forEach(index => this.#heats.Teams.splice(index, 1));
          return true;
        }
      }

      static Venues = {
        All: () => this.#heats.Venues,
        Find: (id) => this.#heats.Venues.find(venue => this.#findBy.Id(venue, id)) ?? this.Venues.Null,
        Sorted: () => this.#heats.Venues.sort(this.#sortBy.Name),
        Null: {
          "id": -1,
          "name": "TBA",
          "address": "TBA",
          "locationLink": ""
        }
      }

      static MCs = {
        All: () => this.#heats.MCs,
        Find: (id) => this.#heats.MCs.find(mc => this.#findBy.Id(mc, id)) ?? this.MCs.Null,
        Sorted: () => this.#heats.MCs.sort(this.#sortBy.Name),
        Null: {
          "id": -1,
          "name": "TBA"
        }
      }

      static Heats = {
        All: () => this.#heats.Heats,
        Find: (id) => this.#heats.Heats.find(heat => this.#findBy.Id(heat, id)),
        Sorted: () => this.#heats.Heats.sort(this.#sortBy.Date),
        DeleteTeamById: (teamId) => {
          this.#heats.Heats.filter(heat => heat.teams.includes(teamId))
                           .forEach(heat => heat.teams.map(team => 
                                                        heat.teams.findIndex(id => id === teamId))
                                                      .filter(index => index > -1)
                                                      .reverse()
                                                      .forEach(index => 
                                                        heat.teams.splice(index, 1)));

          return true;
        }
      }

      static #Empty = class {
        static getSchools() {return [];}
        static getTeams() { return [];}
        static getVenues() { return [];}
        static getMCs() { return [];}
        static getHeats() { return [];}
      }

      static #localStorageKey = "heats-data";

      static loadFromLocalStorage() {
        const dataString = window.localStorage.getItem(this.#localStorageKey);
        this.verify(JSON.parse(dataString));
        Render.All();
      }
    
      static saveTolocalStorage(){
        this.verify();

        try {
          localStorage.setItem(this.#localStorageKey, JSON.stringify(this.#heats))
          PopupMessage.Show("Data saved to local storage");
        } catch (error){
          PopupMessage.ShowError(error);
        }
      }
      
      static verify(newData) {
        if(newData) this.#heats = newData;
        if(!this.#heats){
          this.#heats = this.reset();
          return;
        }
        if(!this.#heats.Schools) this.#heats.Schools = this.#Empty.getSchools();
        if(!this.#heats.Teams) this.#heats.Teams = this.#Empty.getTeams();
        if(!this.#heats.Venues) this.#heats.Venues = this.#Empty.getVenues();
        if(!this.#heats.MCs) this.#heats.MCs = this.#Empty.getMCs();
        if(!this.#heats.Heats) this.#heats.Heats = this.#Empty.getHeats();

        return this.#heats;
      }

      static reset() {
        this.verify({});
      }

      static Download = class {
        static #defaultFilename = "Heats.json";
        static asJSON() {
          try{
            const fileType = "application/json"

            const blob = new Blob([JSON.stringify(this.verify())], { type: fileType });
            const url = URL.createObjectURL(blob);

            const a = document.createElement("a");
            a.href = url;
            a.download = this.#defaultFilename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
              
          } catch (error) {
            PopupMessage.ShowError(error);
          }
        };
      }
    };

        MC: {

          Division: "{heat-division}",

      static #templates = {
        School: {
          Editor: `
          <div class="table-row" data-schoolId="${Render.#fields.School.Id}">
            <div class="tabel-cell commands">
              <a class="command-button edit-school"
                 title="Edit School">
                <i class="fas fa-edit"></i>

            </div>
            <div class="tabel-cell commands">
              <a class="command-button delete-school"
                 title="Delete School">
                <i class="far fa-trash-alt"></i>
              </a>
            </div>
            <div class="tabel-cell" data-field="Name"
                 data-value="${Render.#fields.School.Name}"
                 onclick="onCellClick(event)">
              ${Render.#fields.School.Name}
            </div>
          </div>`.trim(),
          Row: `<tr data-id="${this.#fields.School.Id}"><td>${this.#fields.School.Name}</td></tr>`.trim()
        },
        Team: {
          Row: `<tr data-id="${this.#fields.Team.Id}"><td>${this.#fields.School.Name}</td><td>${this.#fields.Team.Division}</td><td>${this.#fields.Team.Name}</td></tr>`.trim()
        },
        Venue: {
          Row: `<tr data-id="${this.#fields.Venue.Id}"><td>${this.#fields.Venue.Name}</td><td>${this.#fields.Venue.Address}</td><td>${this.#fields.Venue.Location}</td></tr>`.trim()
        },
        MC: {
          Row: `<tr data-id="${this.#fields.MC.Id}"><td>${this.#fields.MC.Name}</td></tr>`.trim()
        },
        Heat: {
          Row: `
            <tr data-id="${this.#fields.Heat.Id}">
              <td>${this.#fields.Heat.Id}</td>
              <td>${this.#fields.Heat.Division}</td>
              <td>${this.#fields.Heat.Date}</td>
              <td>${this.#fields.Venue.Name}</td>
              <td>${this.#fields.MC.Name}</td>
              </td>
            </tr>`.trim()
        }
      }

      static #resetSection(section){
        section.Count.innerHTML = 0;
        section.TableBody.innerHTML = "";
        if(!section.Editor) return;
        section.Editor.TableBody.innerHTML = "";
      }

      static Reset() {

        Render.#resetSection(Elements.School);
        Render.#resetSection(Elements.Team);
        Render.#resetSection(Elements.Venue);
        Render.#resetSection(Elements.MC);
        Render.#resetSection(Elements.Heat);

      };

      static #dateFormater = class {
        static #formatOpsion = {
          Locality: 'en-AU',
          Format: {
            weekday: 'long',
            day: 'numeric',
            month: 'long',
            year: 'numeric',
            timeZone: "Australia/Brisbane"
          }
        };
        static #formater = new Intl.DateTimeFormat(this.#formatOpsion.Locality, this.#formatOpsion.Format);
        static format(date) {
          if(!(date instanceof Date)) date = new Date(date);
          return this.#formater.format(date);
        }
      }

      static #render = {
        School: {
          All: (html,school) => (html += this.#templates.School.Row
                                             .replaceAll(this.#fields.School.Id, school.id)
                                             .replaceAll(this.#fields.School.Name, school.name)),
          Editor: (html,school) => html += this.#templates.School.Editor
                                           .replaceAll(this.#fields.School.Id, school.id)
                                           .replaceAll(this.#fields.School.Name, school.name),
        },

        Team: {
          All: (html, team) =>{
            const school = Data.Schools.Find(team.schoolId);
            return (html += this.#templates.Team.Row
                                           .replaceAll(this.#fields.Team.Id, team.id)
                                           .replaceAll(this.#fields.School.Name, school.name)
                                           .replaceAll(this.#fields.Team.Division, team.division)
                                           .replaceAll(this.#fields.Team.Name, team.name));
          }
        },

        Venue: {
          All: (html, venue) => (html += this.#templates.Venue.Row
                                                        .replaceAll(this.#fields.Venue.Id, venue.id)
                                                        .replaceAll(this.#fields.Venue.Name, venue.name)
                                                        .replaceAll(this.#fields.Venue.Address, venue.address)
                                                        .replaceAll(this.#fields.Venue.Location, venue.locationLink))
        },

        MC: {
          All: (html, mc) => (html += this.#templates.MC.Row
                                                     .replaceAll(this.#fields.MC.Id, mc.id)
                                                     .replaceAll(this.#fields.MC.Name, mc.name))
        },

        Heat: {
          All: (html, heat) => {
            const venue = Data.Venues.Find(heat.venueId);
            const mc = Data.MCs.Find(heat.mcId);
            const heatDate = this.#dateFormater.format(new Date(heat.date));
            return (html += this.#templates.Heat.Row
                                           .replaceAll(this.#fields.Heat.Id, heat.id)
                                           .replaceAll(this.#fields.Heat.Division, heat.division)
                                           .replaceAll(this.#fields.Heat.Date, heatDate)
                                           .replaceAll(this.#fields.Venue.Name, venue.name)
                                           .replaceAll(this.#fields.MC.Name, mc.name));
          }
        }
      };

      static #eventHandlers = {
        School: {
          DeleteClick: (event) => {
            const row = event.target.closest(".table-row");
            const schoolId = row?.dataset?.schoolid;
            const school = Data.Schools.Find(schoolId);
            PopupMessage.WarningDialog.Show(`
            <strong>Are you sure you want to delete ${school.name}?</strong>
            <div>All associated teams will also be deleted, and removed from heats</div>`,
                                            () => this.#eventHandlers.School.ConfirmDelete(row, school),
                                            this.#eventHandlers.School.CancelDelete)
          },
          ConfirmDelete: (row, school) => {
            const schoolName = school.name;
            const schoolId = school.id;
            if(row.parentNode){
              row.parentNode.removeChild(row);
            }
            if(Data.Schools.Delete(schoolId)) {
              PopupMessage.Show(`${schoolName} was deleted from Schools`);
              Render.Teams();
              Render.Schools();
              return;
            }
            PopupMessage.ShowError(`${schoolName} could not be deleted from Schools`);
          },
          CancelDelete: () => {
            PopupMessage.Show("Cancelled: School not deleted.");
          }
        }

      }

      static Schools(){
        if(!Data.Schools.All().length) {
          Render.#resetSection(Elements.School)
          return;
        }

        const schools = Data.Schools.Sorted()
        Elements.School.Count.innerHTML = `${schools.length ?? 0}`;
        Elements.School.TableBody.innerHTML = schools.reduce(this.#render.School.All, "");
        Elements.School.Editor.TableBody.innerHTML = schools.reduce(this.#render.School.Editor, "");

        Elements.School.Editor.Rows().forEach(row => {
          const id = row.dataset.schoolid;
          if(!id)
            return;

          const editButton = row.querySelector(".edit-school")
          const deleteButton = row.querySelector(".delete-school")
          editButton.addEventListener("click", (e) => PopupMessage.Show(`Edit School Id: ${id}`))
          deleteButton.addEventListener("click", this.#eventHandlers.School.DeleteClick);
        });
      }

      static Teams(){
        if(!Data.Teams.All().length) {
          Render.#resetSection(Elements.Team)
          return;
        }

        const teams = Data.Teams.Sorted();
        Elements.Team.Count.innerHTML = `${teams.length ?? 0}`;
        Elements.Team.TableBody.innerHTML = teams.reduce(this.#render.Team.All, "");
      }

      static Venues() {
        const venues = Data.Venues.Sorted();
        Elements.Venue.Count.innerHTML = `${venues.length ?? 0}`;
        Elements.Venue.TableBody.innerHTML = venues.reduce(this.#render.Venue.All, "");
      }

      static MCs() {
        const mc = Data.MCs.Sorted();
        Elements.MC.Count.innerHTML = `${mc.length ?? 0}`;
        Elements.MC.TableBody.innerHTML = mc.reduce(this.#render.MC.All, "");
      }

      static Heats() {
        const heat = Data.Heats.Sorted();
        Elements.Heat.Count.innerHTML = `${heat.length ?? 0}`;
        Elements.Heat.TableBody.innerHTML = heat.reduce(this.#render.Heat.All, "");
      }

      static All() {
        if(!Data.verify()) {
          this.Reset();
          return;
        }

        this.Schools();
        
        this.Teams();

        this.Venues();

        this.MCs();

        this.Heats();
      }

    }

    function editSchoolRow(){
      
    }
/*
 * Event Handlers
 */

    function onCellClick(e) {
      const fieldName = e.target.dataset.field;

      PopupMessage.Show(`Field: ${fieldName}`);
    }

    function onSaveButtonClick() {
      Data.saveTolocalStorage();
    }

    function onLoadJsonClick() {
      Elements.Upload.JSON.click();
    }

    function onJsonUploadChange(event) {
      const file = event.target.files[0];
      if (file && file.type === "application/json") {
        const reader = new FileReader();

        reader.onload = function(e){
          try {
            Data.verify(JSON.parse(e.target.result));
            Render.All();
            PopupMessage.Show(`File ${"file"} loaded successfully`);
          } catch (error){
            console.error("FileReader error:", e.target.error);
            PopupMessage.ShowError("Error reading file.");
          }
        };
        
        reader.onerror = function(e) {
          console.error("FileReader error:", e.target.error);
          PopupMessage.ShowError("Error reading file.");
        };

        reader.readAsText(file);

        Elements.Upload.JSON.value = "";
        return;
      }

      PopupMessage.Show(`File ${"file"} is not valid`);
      Elements.Upload.JSON.value = "";
    }

    function onLoadCsvClick() {
      Elements.Upload.Csv.click();
    }

    function onCsvUploadChange(event) {
      PopupMessage.FeatureNotImplemented("CSV upload");
      Elements.Upload.Csv.value = "";
    }

    function onDownloadClick() {
      Data.Download.asJSON();
    }

    function onMenuItemClick(e) {
      const className = "selected";
      const menuItem = e.target;
      var sectionName = menuItem?.dataset?.section;

      if(!sectionName) {
        PopupMessage.ShowError("Section missing");
      }
      
      menuItem.classList.add(className);
      [...Elements.Menu.Links].filter(l => l.dataset.section !== sectionName)
                              .forEach(l => l.classList.remove(className));

      Elements.Section.All
              .forEach(s => {
                if(s.dataset.section == sectionName) {
                  s.classList.add("show");
                } else {
                  s.classList.remove("show");
                }
              });

    }

    function onNewSchoolClick() {
      PopupMessage.FeatureNotImplemented();
    }

    function hookupGlobalEvents() {
      Elements.Upload.JSON.addEventListener('change', onJsonUploadChange);
      Elements.Upload.Csv.addEventListener('change', onCsvUploadChange);
      Elements.Menu.Links.forEach(l => l.addEventListener('click', onMenuItemClick))
    }

    hookupGlobalEvents();
    Data.loadFromLocalStorage();

  </script>
</body>
